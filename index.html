<style>
  :root{

    --daily:#e07a5f; --paper:#c77bb0; --office:#444; --kiosk:#3aa17e;

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5}
  header{padding:22px 16px 14px;background:#1f1d1a;color:#fff;position:sticky;top:0;z-index:30}
  header .badge{display:inline-block;font-size:11px;letter-spacing:.18em;color:#e9a23b;font-weight:700;margin-bottom:6px}
  header h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em}
  header .meta{margin-top:5px;font-size:12.5px;color:#bbb}
  .toolbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 16px 6px;border-bottom:1px solid var(--line)}
  .searchwrap{position:relative}
  #search{width:100%;padding:11px 38px 11px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;background:#fff;outline:none}
  #search:focus{border-color:#1f1d1a}
  #clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e6e2d8;
    width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;display:none;color:#555}
  .rowbtns{display:flex;gap:8px;margin-top:10px}
  .rowbtns button{flex:1;padding:9px;border:1.5px solid var(--line);background:#fff;border-radius:10px;
    font-size:13px;font-weight:600;cursor:pointer;color:#444}
  .rowbtns button.on{background:#1f1d1a;color:#fff;border-color:#1f1d1a}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;
    border:1.5px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap;color:#555}
  .chip.on{color:#fff;border-color:transparent}
  .count{padding:2px 16px 4px;font-size:12px;color:var(--sub)}
  .grid{padding:6px 12px 90px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr 1fr}}
  @media(min-width:820px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 11px 12px;
    position:relative;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c)}
  .card .booth{font-size:11px;font-weight:800;color:var(--c);letter-spacing:.04em}
  .card .ko{font-size:14.5px;font-weight:700;letter-spacing:-.01em;padding-right:18px}
  .card .en{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.02em}
  .card .cat{margin-top:5px;font-size:10px;color:#999;font-weight:600}
  .star{position:absolute;top:8px;right:8px;font-size:18px;cursor:pointer;line-height:1;color:#d9d4c7;
    background:none;border:none;padding:2px}
  .star.on{color:#f0a92b}
  .num{position:absolute;bottom:8px;right:8px;min-width:22px;height:22px;border-radius:11px;
    background:#1f1d1a;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;
    justify-content:center;padding:0 5px}
  .pick{position:absolute;top:8px;left:8px;font-size:10px;background:#f0a92b;color:#1f1d1a;
    font-weight:800;padding:2px 5px;border-radius:5px;letter-spacing:.02em}
  #routeNote{margin-top:9px;font-size:12.5px;color:#555;background:#fff7e8;border:1px solid #f0d8a8;
    border-radius:10px;padding:9px 11px;line-height:1.45;display:none}
  #routeNote b{color:#b5781a}
  .hall{grid-column:1/-1;margin:14px 4px 2px;font-size:12px;font-weight:800;color:#999;letter-spacing:.05em}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:50px 20px;font-size:14px}
  footer{text-align:center;font-size:11px;color:#aaa;padding:0 20px 40px}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;padding:0 16px 14px}
  .legend span{font-size:11px;color:#666;display:flex;align-items:center;gap:4px}
  .legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .mapsec{background:#1f1d1a;padding:8px 0 4px}
  .maphint{color:#bbb;font-size:11px;padding:0 16px 6px;display:flex;justify-content:space-between;align-items:center}
  .maphint button{background:#3a3733;color:#eee;border:none;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}
  #hallNow{display:none;margin-left:6px;background:#e9a23b;color:#1f1d1a;font-weight:800;
    font-size:10.5px;padding:2px 7px;border-radius:5px;letter-spacing:.03em;vertical-align:middle}
  .mapscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:0 16px}
  .mapinner{position:relative;display:inline-block;border-radius:8px;overflow:hidden}
  .mapscroll img{height:230px;width:auto;max-width:none;display:block;cursor:zoom-in;transition:height .2s}
  .mapscroll.big img{height:560px;cursor:zoom-out}
  svg.route{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  svg.route.hide{display:none}
  .gpsbar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;padding:8px 16px 4px}
  .gpsbar .gpsmsg{flex:1 1 100%;font-size:11.5px;color:#cfcabf;line-height:1.4}
  .gpsbar button{background:#2f6fed;color:#fff;border:none;font-size:12px;font-weight:700;
    padding:7px 12px;border-radius:8px;cursor:pointer}
  .gpsbar button.ghost{background:#3a3733;color:#ddd}
  .card.here{outline:2px solid #2f6fed;outline-offset:-2px}
  .here-tag{position:absolute;bottom:8px;left:8px;font-size:9.5px;background:#2f6fed;color:#fff;
    font-weight:800;padding:2px 6px;border-radius:5px;letter-spacing:.02em}
  .modal{position:fixed;inset:0;background:rgba(20,18,16,.55);z-index:50;display:none;
    align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
    border-radius:18px 18px 0 0;padding:18px 18px 26px;animation:slideup .22s ease}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h2{margin:2px 0 2px;font-size:18px}
  .sheet .lead{font-size:12.5px;color:#777;margin-bottom:16px}
  .q{margin:0 0 16px}
  .q .qt{font-size:14px;font-weight:800;margin-bottom:8px}
  .q .qs{font-size:11px;color:#aaa;font-weight:600}
  .opts{display:flex;flex-wrap:wrap;gap:7px}
  .opt{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;

  .opt.sel{background:#1f1d1a;color:#fff;border-color:#1f1d1a}
  .sheet .go{width:100%;margin-top:6px;padding:13px;border:none;border-radius:12px;
    background:#e9a23b;color:#1f1d1a;font-size:15px;font-weight:800;cursor:pointer}
  .sheet .cancel{width:100%;margin-top:8px;padding:10px;border:none;background:none;

// 두 기준점으로 GPS(위경도) → 도면 픽셀 닮음변환(회전·균일스케일·평행이동)
function gpsToPixel(lat,lon){
  const a0=geoAnchors[0], a1=geoAnchors[1];
  const k=Math.cos(a0.lat*Math.PI/180); // 경도 거리 보정
  const pBx=(a1.lon-a0.lon)*k, pBy=(a1.lat-a0.lat);
  const pPx=(lon-a0.lon)*k,    pPy=(lat-a0.lat);
  const dqx=a1.px-a0.px, dqy=a1.py-a0.py;
  const den=pBx*pBx+pBy*pBy;
  if(den===0) return null;
  // 복소수 나눗셈 a = dq / dp
  const ax=(dqx*pBx+dqy*pBy)/den;
  const ay=(dqy*pBx-dqx*pBy)/den;
  const qx=ax*pPx-ay*pPy + a0.px;
  const qy=ay*pPx+ax*pPy + a0.py;
  const scale=Math.sqrt(ax*ax+ay*ay); // 픽셀/도(degree)
  return {x:qx,y:qy,scale};
}

function startGps(){
  if(!navigator.geolocation){ alert("이 브라우저는 위치 기능을 지원하지 않아요."); return; }
  gpsActive=true; updateGpsUI();
  watchId=navigator.geolocation.watchPosition(onPos,onErr,
    {enableHighAccuracy:true,maximumAge:1000,timeout:15000});
}
function stopGps(){
  if(watchId!=null) navigator.geolocation.clearWatch(watchId);
  watchId=null; gpsActive=false; lastPos=null; updateGpsUI(); setHereDot();
}
function onPos(p){
  lastPos={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy};
  updateGpsUI(); setHereDot();
}
function onErr(e){
  gpsActive=false; updateGpsUI();
  alert(e.code===1 ? "위치 권한이 거부됐어요. 브라우저 설정에서 위치 접근을 허용해 주세요."
                   : "GPS 신호를 받지 못했어요. 실내에서는 잠시 걸릴 수 있어요.");
}

function calibrateHere(){
  if(!lastPos){ alert("GPS 신호를 받는 중이에요. 잠시 후 다시 눌러주세요."); return; }
  if(!currentLoc || !COORDS[currentLoc]){ alert("먼저 지금 서 있는 부스 카드를 탭해서 선택하세요."); return; }
  if(geoAnchors.some(a=>a.booth===currentLoc)){ alert("이미 보정한 부스예요. 다른 부스로 이동해서 보정하세요."); return; }
  const [px,py]=COORDS[currentLoc];
  geoAnchors.push({lat:lastPos.lat,lon:lastPos.lon,px,py,booth:currentLoc});
  if(geoAnchors.length>2) geoAnchors=geoAnchors.slice(-2);
  localStorage.setItem(GKEY,JSON.stringify(geoAnchors));
  updateGpsUI(); setHereDot(); render();
}

function nearest(list,t){ let best=list[0],bd=Infinity; for(const p of list){const dx=p[0]-t[0],dy=p[1]-t[1],dd=dx*dx+dy*dy; if(dd<bd){bd=dd;best=p;}} return best; }

// --- 통로 격자: 부스 박스 피해 통로(아일)로 라우팅 ---
const HALL2_HY=[200,525,768], HALL2_VX=[258,850,1310];
const HALL1_HY=[250,412,565,768], HALL1_VX=[1685,2090,2665];
const SPINE_Y=768; // 양 홀을 잇는 하단 통로(입·출구 라인)
function hallOf(p){ return p[0]<1400?2:1; }
function HY(h){ return h===2?HALL2_HY:HALL1_HY; }
function VX(h){ return h===2?HALL2_VX:HALL1_VX; }
function nv(arr,v){ let b=arr[0],bd=Math.abs(arr[0]-v); for(const a of arr){const d=Math.abs(a-v); if(d<bd){bd=d;b=a;}} return b; }
// 두 점을 통로만 따라 잇는 경유점(맨해튼)
function legBetween(p1,p2){
  const h1=hallOf(p1),h2=hallOf(p2);
  const a1=nv(HY(h1),p1[1]),a2=nv(HY(h2),p2[1]);
  const out=[[p1[0],a1]];
  if(h1===h2 && a1===a2){ out.push([p2[0],a2]); }
  else if(h1===h2){
    const vx=nv(VX(h1),(p1[0]+p2[0])/2);
    out.push([vx,a1],[vx,a2],[p2[0],a2]);
  } else {
    const vx1=nv(VX(h1),p1[0]),vx2=nv(VX(h2),p2[0]);
    out.push([vx1,a1],[vx1,SPINE_Y],[vx2,SPINE_Y],[vx2,a2],[p2[0],a2]);
  }
  out.push([p2[0],p2[1]]);
  return out;
}
function buildAisle(points){
  const stopKey=new Set(points.map(p=>p[0]+","+p[1])); // 실제 정차(부스·입·출구) 정점
  const poly=[[points[0][0],points[0][1]]];
  for(let i=1;i<points.length;i++){
    for(const q of legBetween(points[i-1],points[i])){
      const last=poly[poly.length-1];
      if(Math.abs(last[0]-q[0])>1||Math.abs(last[1]-q[1])>1) poly.push([q[0],q[1]]);
    }
  }
  for(const p of poly) p[2]=stopKey.has(p[0]+","+p[1])?1:0;
  return poly;
}
// 코너 둥글림 → 부드러운 곡선
function roundedPath(P,r){
  if(P.length<3) return "M"+P.map(p=>p[0]+","+p[1]).join(" L");
  let d=`M${P[0][0]},${P[0][1]}`;
  for(let i=1;i<P.length-1;i++){
    const a=P[i-1],c=P[i],b=P[i+1];
    const v1x=c[0]-a[0],v1y=c[1]-a[1],l1=Math.hypot(v1x,v1y)||1;
    const v2x=b[0]-c[0],v2y=b[1]-c[1],l2=Math.hypot(v2x,v2y)||1;
    const rr=c[2]?5:r; // 정차 부스에선 거의 안 둥글려 선이 점에 닿게
    const r1=Math.min(rr,l1/2),r2=Math.min(rr,l2/2);
    const inx=c[0]-v1x/l1*r1,iny=c[1]-v1y/l1*r1;
    const outx=c[0]+v2x/l2*r2,outy=c[1]+v2y/l2*r2;
    d+=` L${inx.toFixed(1)},${iny.toFixed(1)} Q${c[0]},${c[1]} ${outx.toFixed(1)},${outy.toFixed(1)}`;
  }
  const last=P[P.length-1];
  d+=` L${last[0]},${last[1]}`;
  return d;
}

// 선택 부스 기반 동선 (시작=현위치 또는 가까운 입구, 끝=가까운 출구)
function setCustomRoute(orderedNums){
  const stopsG=$("#routeStops");
  $("#startTag").style.display="none";
  const stops=[]; const seen=new Set();
  orderedNums.forEach(n=>{
    if(currentLoc && n===currentLoc) return;
    if(seen.has(n)) return; seen.add(n);
    const p=COORDS[n]; if(p) stops.push(p);
  });
  if(!stops.length){
    $("#routeHalo").setAttribute("d","");
    $("#routeLine").setAttribute("d","");
    stopsG.innerHTML=""; return;
  }
  const useHere = currentLoc && COORDS[currentLoc];
  const start = useHere ? COORDS[currentLoc] : nearest(ENTRANCES, stops[0]);
  const end = nearest(EXITS, stops[stops.length-1]);
  const pts=[start,...stops,end];
  const poly=buildAisle(pts);
  const d=roundedPath(poly,26);
  $("#routeHalo").setAttribute("d",d);
  $("#routeLine").setAttribute("d",d);
  let h="";
  stops.forEach((p,i)=>{
    h+=`<circle cx="${p[0]}" cy="${p[1]}" r="18" fill="#e6332a" stroke="#fff" stroke-width="4"></circle>`+
       `<text x="${p[0]}" y="${p[1]+9}" font-size="25" font-weight="800" fill="#fff" text-anchor="middle" font-family="sans-serif">${i+1}</text>`;
  });
  if(!useHere){
    h+=`<circle cx="${start[0]}" cy="${start[1]}" r="19" fill="#1f9d55" stroke="#fff" stroke-width="5"></circle>`+
       `<rect x="${start[0]-77}" y="${start[1]+18}" width="154" height="44" rx="8" fill="#1f9d55"></rect>`+
       `<text x="${start[0]}" y="${start[1]+49}" font-size="29" font-weight="800" fill="#fff" text-anchor="middle" font-family="sans-serif">입구 IN</text>`;
  }
  h+=`<circle cx="${end[0]}" cy="${end[1]}" r="19" fill="#e6332a" stroke="#fff" stroke-width="5"></circle>`+
     `<rect x="${end[0]-77}" y="${end[1]+18}" width="154" height="44" rx="8" fill="#e6332a"></rect>`+
     `<text x="${end[0]}" y="${end[1]+49}" font-size="29" font-weight="800" fill="#fff" text-anchor="middle" font-family="sans-serif">출구 OUT</text>`;
  stopsG.innerHTML=h;
}

// 현위치 파란 점 (GPS 추적 중이면 실제 위치, 아니면 수동 지정 부스)
function setHereDot(){
  const g=$("#hereDot"), acc=$("#accCircle");
  let show=null;
  if(gpsActive && geoAnchors.length>=2 && lastPos){
    const r=gpsToPixel(lastPos.lat,lastPos.lon);
    if(r){
      show={x:r.x,y:r.y};
      const accPx=Math.max(10,(lastPos.acc/111320)*r.scale); // 미터→도→픽셀
      acc.setAttribute("r",accPx);
      acc.style.display="";
    }
  }
  if(!show){
    acc.style.display="none";
    if(currentLoc && COORDS[currentLoc]){ const [x,y]=COORDS[currentLoc]; show={x,y}; }
  }
  if(show){
    g.setAttribute("transform",`translate(${show.x},${show.y})`);
    g.style.display="";
  } else g.style.display="none";
}

function render(){
  buildChips();
  let list;
  if(routeMode){
    list = recoLineup.slice();
  } else {
    list = BOOTHS.filter(b=>{
      if(favOnly && !favs.has(id(b))) return false;
      if(!favOnly && activeCat!=="all" && b[3]!==activeCat) return false;
      if(query){
        const q=query.toLowerCase();
        if(!(b[0].toLowerCase().includes(q) || b[1].toLowerCase().includes(q) || b[2].toLowerCase().includes(q))) return false;
      }
      return true;
    });
    list.sort((a,b)=>{
      const ha=HALL_ORDER.indexOf(a[0][0]), hb=HALL_ORDER.indexOf(b[0][0]);
      if(ha!==hb) return ha-hb;
      return a[0].localeCompare(b[0],undefined,{numeric:true});
    });
  }

  countEl.textContent = favOnly ? `내 동선 ${list.length}곳` : (routeMode ? `🎯 맞춤 추천 ${list.length}곳` : `${list.length}개 부스`);

    $("#routeNote").innerHTML = currentLoc
      ? `<b>📍 현위치: ${currentLoc}</b> 기준 동선. 파란 점에서 출발해 번호 순서대로 도세요. 다른 카드를 탭하면 현위치 변경, ${currentLoc} 다시 탭하면 해제.`
      : `<b>내가 고른 부스 동선</b> — 위 맵에 번호 순서로 표시돼요. <b>지금 서 있는 부스 카드를 탭하면</b> 그 자리(📍)에서 출발하는 동선으로 바뀌어요.`;
  }
  grid.innerHTML="";
  let stop=0;
  const routeNums=[];

  if(!list.length){
    grid.innerHTML = `<div class="empty">${favOnly?"아직 저장한 부스가 없어요.<br>카드의 ★를 눌러 동선을 만들어보세요.":"검색 결과가 없어요."}</div>`;

    setHereDot();
    return;
  }

  let curHall="";
  for(const b of list){
    const hall=b[0][0];
    if(hall!==curHall && !query){
      curHall=hall;
      const h=document.createElement("div");
      h.className="hall";
      h.textContent = hall==="M" ? "M · 라운지/공용" : (hall<="L"&&hall>="A" ? hall+"열" : hall);
      grid.appendChild(h);
    }
    const c=CATS[b[3]];
    const card=document.createElement("div");
    card.className="card"+(currentLoc===b[0]?" here":"");
    card.style.setProperty("--c",c.color);
    const on=favs.has(id(b));
    const isPick=PICKS.has(id(b));
    let extra="";
    if(routeMode||favOnly){ stop++; extra=`<div class="num">${stop}</div>`; if(routeMode&&isPick) extra+=`<div class="pick">★ MUST</div>`; }
    if(favOnly||routeMode) routeNums.push(b[0]);
    if(currentLoc===b[0]) extra+=`<div class="here-tag">📍 지금</div>`;
    card.innerHTML=`
      <button class="star${on?" on":""}" aria-label="저장">${on?"★":"☆"}</button>
      <div class="booth">${b[0]}</div>
      <div class="ko">${b[1]}</div>
      <div class="en">${b[2]}</div>
      <div class="cat">${c.name}</div>${extra}`;
    card.querySelector(".star").onclick=(e)=>{
      e.stopPropagation();
      const k=id(b);
      if(favs.has(k)) favs.delete(k); else favs.add(k);
      saveFavs(); render();
    };
    card.onclick=()=>{ currentLoc = (currentLoc===b[0]) ? null : b[0]; render(); };
    grid.appendChild(card);
  }

  if(favOnly||routeMode){ $("#routeSvg").classList.remove("hide"); $("#routeToggle").textContent="동선 끄기"; setCustomRoute(routeNums); }
  else setRecoRoute();
  setHereDot();
}

const QUIZ=[
  {key:"cats",multi:true,t:"제일 노리는 카테고리는?",s:"복수 선택 OK",opts:[
    {l:"펜·필기구",v:"writing"},{l:"노트·다이어리·종이",v:"paper"},
    {l:"스티커·마테·소품",v:"small"},{l:"디자인·캐릭터 굿즈",v:"daily"},
    {l:"데스크·오피스",v:"office"}]},
  {key:"tier",t:"브랜드 취향은?",opts:[
    {l:"해외 유명 브랜드",v:"global"},{l:"국내 독립·스몰",v:"indie"},{l:"안 가림",v:"any"}]},
  {key:"n",t:"오늘 쓸 시간은?",opts:[
    {l:"1~2시간 · 핵심 12곳",v:12},{l:"3시간 · 20곳",v:20},{l:"반나절 · 30곳",v:30}]},
  {key:"desk",t:"책상 꾸미기·데스크셋업 관심?",opts:[
    {l:"완전 좋아함",v:1},{l:"보통",v:0}]},
  {key:"workshop",t:"워크숍·체험 부스도 들를래?",opts:[
    {l:"응, 들를래",v:1},{l:"쇼핑 위주",v:0}]},
];
let quizState={cats:["small","daily","office"],tier:"any",n:20,desk:1,workshop:0};

function renderQuiz(){
  const body=$("#quizBody"); body.innerHTML="";
  QUIZ.forEach(q=>{
    const wrap=document.createElement("div"); wrap.className="q";
    wrap.innerHTML=`<div class="qt">${q.t}${q.s?` <span class="qs">${q.s}</span>`:""}</div>`;
    const opts=document.createElement("div"); opts.className="opts";
    q.opts.forEach(o=>{
      const sel=q.multi?quizState[q.key].includes(o.v):quizState[q.key]===o.v;
      const btn=document.createElement("div");
      btn.className="opt"+(sel?" sel":""); btn.textContent=o.l;
      btn.onclick=()=>{
        if(q.multi){ const arr=quizState[q.key],i=arr.indexOf(o.v); if(i>=0) arr.splice(i,1); else arr.push(o.v); }
        else quizState[q.key]=o.v;
        renderQuiz();
      };
      opts.appendChild(btn);
    });
    wrap.appendChild(opts); body.appendChild(wrap);
  });
}
function openQuiz(){ renderQuiz(); $("#quizModal").classList.add("show"); }
function closeQuiz(){ $("#quizModal").classList.remove("show"); }

function scoreBooth(b,a){
  if(b[3]==="common") return 0;
  if(b[3]==="workshop" && !a.workshop) return 0;
  let s=0;
  if(a.cats.length){ if(a.cats.includes(b[3])) s+=3; } else s+=1;
  const g=GLOBAL.has(id(b));
  if(a.tier==="global") s+= g?2.5:0;
  else if(a.tier==="indie") s+= g?0:1.5;
  if(a.desk){ if(b[3]==="office") s+=2; if(DESKY.has(id(b))) s+=1.5; }
  if(PICKS.has(id(b))) s+=1.2;
  return s;
}
function computeReco(a){
  const best={};
  for(const b of BOOTHS){
    const s=scoreBooth(b,a); if(s<=0) continue;
    const c=b[0]; if(!best[c]||best[c][1]<s) best[c]=[b,s];
  }
  const pool=Object.values(best).sort((x,y)=>
    y[1]-x[1] || ((PICKS.has(id(y[0]))?1:0)-(PICKS.has(id(x[0]))?1:0)));
  let chosen;
  if(a.cats.length){
    const byCat={}; a.cats.forEach(c=>byCat[c]=[]); const extra=[];
    for(const e of pool){ const cat=e[0][3]; (byCat[cat]||extra).push(e); }
    chosen=[]; let added=true;
    while(chosen.length<a.n && added){ // 선택 카테고리 균형 분배
      added=false;
      for(const c of a.cats){ if(byCat[c].length){ chosen.push(byCat[c].shift()); added=true; if(chosen.length>=a.n) break; } }
    }
    for(const e of extra){ if(chosen.length>=a.n) break; chosen.push(e); } // 부족 시 유명 브랜드로 채움
  } else {
    chosen=pool.slice(0,a.n);
  }
  chosen.sort((x,y)=>{ // 동선 순서: HALL2 먼저 → 열 → 번호
    const hp=hallOf(COORDS[x[0][0]]||[0,0]), hq=hallOf(COORDS[y[0][0]]||[0,0]);
    if(hp!==hq) return hq-hp;
    const lp=HALL_ORDER.indexOf(x[0][0][0]), lq=HALL_ORDER.indexOf(y[0][0][0]);
    if(lp!==lq) return lp-lq;
    return x[0][0].localeCompare(y[0][0],undefined,{numeric:true});
  });
  return chosen.map(x=>x[0]);
}
function submitQuiz(){
  recoLineup=computeReco(quizState);
  closeQuiz();
  routeMode=true; favOnly=false; activeCat="all"; currentLoc=null;
  syncBtns(); render();
  document.querySelector(".mapsec").scrollIntoView({behavior:"smooth",block:"start"});
}

const hallNow=$("#hallNow"), mapImg=mapScroll.querySelector("img");
function updateHallLabel(){
  const w=mapImg.clientWidth, view=mapScroll.clientWidth;
  if(w-view<8){ hallNow.style.display="none"; return; } // 다 보이면 라벨 불필요
  const centerVb=((mapScroll.scrollLeft+view/2)/w)*2835;
  const [txt,bg] = centerVb<1500 ? ["지금: HALL 2","#7b9e6b"]
                 : centerVb<1680 ? ["지금: LOUNGE","#9a9a9a"]
                 : ["지금: HALL 1","#5b8fd6"];
  hallNow.textContent=txt; hallNow.style.background=bg;
  hallNow.style.color="#fff"; hallNow.style.display="inline-block";
}

};
